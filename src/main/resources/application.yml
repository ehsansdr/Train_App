data:
  elasticsearch:
    cluster-name: elasticsearch
    cluster-nodes: localhost:9200
    repositories:
      enabled: true
    rest:
      # Elasticsearch RestClient settings (for HTTP connections)
      read-timeout: 5000  # Timeout for reading data from the server (in milliseconds)
      connect-timeout: 5000  # Timeout to establish a connection (in milliseconds)
      max-conn-total: 200  # Maximum total connections in the connection pool
      max-conn-per-route: 50  # Maximum connections per route (target host)

server:
  port: 8080 # Or your preferred port

# Logging configuration (optional)
logging:
  level:
    root: INFO  # Or DEBUG for more detailed output
    org.hibernate.SQL: DEBUG # To see SQL statements
    org.hibernate.type.descriptor.sql: TRACE # To see data binding